<ion-header>
  <ion-toolbar>
    <ion-title translate="no">Intercagram</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <img src="assets/icon/logo.png" alt="Intercagram" class="login-logo" translate="no" />
    <p class="login-tagline">Conecta con el mundo</p>

    <ion-segment [(ngModel)]="mode">
      <ion-segment-button value="login">
        <ion-label>Ingresar</ion-label>
      </ion-segment-button>
      <ion-segment-button value="register">
        <ion-label>Registrar</ion-label>
      </ion-segment-button>
    </ion-segment>

    <div class="form-fields">
      <div *ngIf="mode === 'register'" class="extra-fields">
        <ion-item>
          <ion-input label="Nombre" [(ngModel)]="name"></ion-input>
        </ion-item>
        <ion-item>
          <ion-input label="Usuario" [(ngModel)]="username"></ion-input>
        </ion-item>
      </div>

      <ion-item>
        <ion-input label="Email" type="email" [(ngModel)]="email"></ion-input>
      </ion-item>
      <ion-item class="password-item">
        <ion-input label="Contraseña" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password"></ion-input>
        <ion-button slot="end" fill="clear" (click)="showPassword = !showPassword" class="eye-btn">
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>

      <ion-button expand="block" (click)="submit()" class="submit-btn" [disabled]="loading">
        {{ loading ? '...' : (mode === 'register' ? 'Crear cuenta' : 'Entrar') }}
      </ion-button>

      <p class="error-msg" *ngIf="error">{{ error }}</p>
    </div>
  </div>
</ion-content>
