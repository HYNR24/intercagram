<ion-header>
  <ion-toolbar>
    <ion-title>Nuevo post</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/feed"></ion-back-button>
    </ion-buttons>  
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Camera viewfinder -->
  <div class="camera-view" *ngIf="showCamera">
    <video #videoEl autoplay playsinline class="camera-video"></video>
    <canvas #canvasEl hidden></canvas>
    <div class="camera-controls">
      <ion-button fill="clear" (click)="flipCamera()">
        <ion-icon name="camera-reverse" size="large"></ion-icon>
      </ion-button>
      <ion-button fill="solid" color="primary" (click)="capture()" class="capture-btn">
        <ion-icon name="camera" size="large"></ion-icon>
      </ion-button>
      <ion-button fill="clear" (click)="closeCamera()">
        <ion-icon name="close-outline" size="large"></ion-icon>
      </ion-button>
    </div>
  </div>

  <!-- Form (hidden while camera is active) -->
  <ng-container *ngIf="!showCamera">
    <ion-item>
      <ion-input label="Descripción" [(ngModel)]="caption"></ion-input>
    </ion-item>

    <ion-grid>
      <ion-row>
        <ion-col>
          <ion-button expand="block" (click)="openCamera()">
            <ion-icon name="camera" size="large"></ion-icon>
            Usar cámara
          </ion-button>
        </ion-col>
        <ion-col>
          <ion-button expand="block" (click)="fileInput.click()">
            <ion-icon name="file-tray" size="large"></ion-icon>
            Elegir archivo
          </ion-button>
          <input #fileInput type="file" accept="image/*" hidden (change)="onFileChange($event)" />
        </ion-col>
        <ion-col><ion-button expand="block" (click)="upload()" [disabled]="uploading">
          <ion-icon name="cloud-upload" size="large"></ion-icon>
          {{ uploading ? 'Publicando...' : 'Publicar' }}
        </ion-button></ion-col>
      </ion-row>
    </ion-grid>

    <ion-img *ngIf="preview" [src]="preview" style="margin-top:16px;border-radius:12px;"></ion-img>
  </ng-container>

</ion-content>
