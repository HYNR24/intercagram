<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="openMenu()">
        <ion-icon name="menu-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-back-button defaultHref="/feed"></ion-back-button>
    </ion-buttons>
    <ion-title>Nuevo post</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <input #cameraInput type="file" accept="image/*" capture="environment" (change)="onFileChange($event)" style="display:none">
  <input #fileInput type="file" accept="image/*" (change)="onFileChange($event)" style="display:none">

  <!-- Upload Card -->
  <div class="upload-card">

    <!-- Camera Viewfinder (PC) -->
    <div class="camera-overlay" *ngIf="cameraActive">
      <div class="camera-viewfinder">
        <video #videoRef autoplay playsinline class="camera-video" *ngIf="!capturedImageUrl"></video>
        <img *ngIf="capturedImageUrl" [src]="capturedImageUrl" class="camera-video captured" />
      </div>
      <div class="camera-controls">
        <ng-container *ngIf="!capturedImageUrl">
          <ion-button class="cam-cancel-btn" (click)="cancelCamera()">
            <ion-icon name="close-outline"></ion-icon>
          </ion-button>
          <ion-button class="cam-shoot-btn" (click)="capturePhoto()">
            <div class="shoot-ring"></div>
          </ion-button>
          <div class="cam-spacer"></div>
        </ng-container>
        <ng-container *ngIf="capturedImageUrl">
          <ion-button class="cam-retake-btn" (click)="retakePhoto()">
            <ion-icon name="close-outline"></ion-icon>
            Rehacer
          </ion-button>
          <ion-button class="cam-accept-btn" (click)="acceptPhoto()">
            <ion-icon name="checkmark-circle"></ion-icon>
            Usar foto
          </ion-button>
        </ng-container>
      </div>
    </div>

    <!-- Drop Zone -->
    <div
      class="drop-zone"
      [class.has-file]="!!file"
      [class.drag-over]="dragOver"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave()"
      (drop)="onDrop($event)"
      (click)="!file && pickFile()"
    >
      <ng-container *ngIf="!file; else previewBlock">
        <div class="drop-placeholder">
          <ion-icon name="image-outline" class="drop-icon"></ion-icon>
          <p class="drop-text">Arrastra una imagen aquí</p>
          <p class="drop-hint">o presiona para seleccionar</p>
        </div>
      </ng-container>

      <ng-template #previewBlock>
        <div class="preview-wrapper">
          <img [src]="preview" class="preview-image" />
          <div class="preview-overlay">
            <ion-button fill="clear" class="remove-btn" (click)="removeFile(); $event.stopPropagation()">
              <ion-icon name="close-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </div>
        </div>
      </ng-template>
    </div>

    <!-- Caption -->
    <ion-input
      class="caption-input"
      [(ngModel)]="caption"
      placeholder="Escribe una descripción..."
      [disabled]="!file"
    ></ion-input>

    <!-- Actions -->
    <div class="action-row" *ngIf="!file">
      <ion-button (click)="openCamera()" class="action-btn cam-btn">
        <ion-icon name="camera" slot="start"></ion-icon>
        Cámara
      </ion-button>
      <ion-button (click)="pickFile()" class="action-btn file-btn">
        <ion-icon name="image-outline" slot="start"></ion-icon>
        Galería
      </ion-button>
    </div>

    <div class="action-row" *ngIf="file">
      <ion-button (click)="upload()" [disabled]="uploading" class="upload-btn" expand="block">
        <ion-spinner *ngIf="uploading" slot="start"></ion-spinner>
        <ion-icon *ngIf="!uploading" name="cloud-upload" slot="start"></ion-icon>
        {{ uploading ? 'Publicando...' : 'Publicar' }}
      </ion-button>
    </div>

  </div>

</ion-content>
