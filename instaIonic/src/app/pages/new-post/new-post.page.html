<ion-header>
  <ion-toolbar>
    <ion-title>Nuevo post</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/feed"></ion-back-button>
    </ion-buttons>  
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="camera-view" *ngIf="showCamera">
    <video #videoEl autoplay playsinline class="camera-video"></video>
    <canvas #canvasEl hidden></canvas>
    <div class="camera-controls">
      <ion-button fill="clear" (click)="flipCamera()">
        <ion-icon name="camera-reverse" size="large"></ion-icon>
      </ion-button>
      <ion-button fill="solid" color="primary" (click)="capture()" class="capture-btn">
        <ion-icon name="camera" size="large"></ion-icon>
      </ion-button>
      <ion-button fill="clear" (click)="closeCamera()">
        <ion-icon name="close-outline" size="large"></ion-icon>
      </ion-button>
    </div>
  </div>

  <ng-container *ngIf="!showCamera">
    <ion-item class="caption-input">
      <ion-input label="Descripción" [(ngModel)]="caption"></ion-input>
    </ion-item>

    <div class="action-grid">
      <ion-button (click)="openCamera()">
        <ion-icon name="camera" slot="start"></ion-icon>
        Cámara
      </ion-button>
      <ion-button (click)="fileInput.click()">
        <ion-icon name="file-tray" slot="start"></ion-icon>
        Archivo
      </ion-button>
      <input #fileInput type="file" accept="image/*" hidden (change)="onFileChange($event)" />
      <ion-button (click)="upload()" [disabled]="uploading">
        <ion-icon name="cloud-upload" slot="start"></ion-icon>
        {{ uploading ? '...' : 'Publicar' }}
      </ion-button>
    </div>

    <div class="preview-img" *ngIf="preview">
      <ion-img [src]="preview"></ion-img>
    </div>
  </ng-container>

</ion-content>
